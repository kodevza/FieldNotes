<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ $css := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  {{ $codeCopy := resources.Get "js/code-copy.js" | minify | fingerprint }}
  <script src="{{ $codeCopy.RelPermalink }}" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/FieldNotes">{{ .Site.Title }}</a>
    <nav><a href="/FieldNotes/notes/">Notes</a></nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <span>Static notes. No tracking.</span>
  </footer>
</body>
</html>
