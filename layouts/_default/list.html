{{ define "main" }}
<section class="page-title">
  <h1>{{ .Title }}</h1>
</section>
<div class="note-list">
  {{ range .Pages.ByDate.Reverse }}
  <article class="note-row">
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p>{{ .Summary }}</p>
    <small>{{ .Date.Format "2006-01-02" }}</small>
  </article>
  {{ end }}
</div>
{{ end }}
